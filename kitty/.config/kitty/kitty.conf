# font 
bold_font        auto
bold_italic_font auto
font_family      family="JetBrainsMono Nerd Font Mono"
font_size        16.0
italic_font      auto

# visual settings
allow_remote_control no
confirm_os_window_close 0
enable_audio_bell       no
hide_window_decorations yes
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_show_window_title no
tab_bar_edge     top
tab_bar_style    slant
window_padding_width    4

enabled_layouts tall, horizontal, vertical

# === keybindings ===
# new windows use current directory
map cmd+enter new_window_with_cwd

# tab navigation - additional bindings
map ctrl+] next_tab
map ctrl+[ previous_tab

# tinted theme sets the values in this file to selected theme
include ./tinted-theming.conf


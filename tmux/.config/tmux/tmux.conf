
# ==============================================================================
# SETTINGS
# ==============================================================================
# NOTE: I dont like to keep sessions, if you do, remove this
set-option -g destroy-unattached on

# Enable extended key sequences (kitty/XTerm CSI u protocol)
# Required for tmux to recognize C-1..9, C-[, C-] sent by Alacritty.
# Alacritty keyboard bindings emit these sequences; tmux maps them to friendly names.
set -g extended-keys on
set -ga terminal-features 'alacritty*:extkeys'

# indexes starts with 1
set -g base-index 1
setw -g pane-base-index 1

# faster key repetition
set -s escape-time 0

# mouse clicks allowed
set -g mouse on

# advertise 256-color support to applications inside the session
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# scrollback buffer size
set -g history-limit 10000

# automatically renumbers windows sequentially whenever a window is closed
set -g renumber-windows on

# prevent tmux from automatically renaming windows
set -g allow-rename off
set -g automatic-rename off
set -g allow-rename off

# vi mode for copy/scroll
setw -g mode-keys vi

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ==============================================================================
# KEYBINDS
# ==============================================================================

# Prefix: [control]+[space]
set -g prefix C-Space
bind C-Space send-prefix

# emulate 'C-a' prefix (for pair partners)
bind C-a send-prefix
bind a last-window

# emulate 'C-b' prefix (for pair partners)
bind C-b send-prefix
bind b last-window

# ==============================================================================

# Menu: Quick Actions
bind Space display-menu \
  "config: reload" r "source-file ~/.config/tmux/tmux.conf" \
  "" \
  "pane: split right" v "split-window -h -c '#{pane_current_path}'" \
  "pane: split down" h "split-window -v -c '#{pane_current_path}'" \
  "pane: toggle fullscreen" f "resize-pane -Z" \
  "pane: rename" p "command-prompt -I '#{pane_title}' { select-pane -T '%%' }" \
  "" \
  "tab: rename" t "command-prompt -p 'Rename window:' -I '#W' { rename-window '%%' }"



# ==============================================================================

# Panes: close
bind -T prefix x kill-pane

# Panes: fullscreen toggle
bind -T prefix f resize-pane -Z

# Panes: navigation
bind -T prefix h select-pane -L
bind -T prefix j select-pane -D
bind -T prefix k select-pane -U
bind -T prefix l select-pane -R
# Panes: navigation (no prefix)
bind -T root C-h select-pane -L
bind -T root C-j select-pane -D
bind -T root C-k select-pane -U
bind -T root C-l select-pane -R

# Panes: split horizontal
bind -T prefix "|" split-window -h -c "#{pane_current_path}"
bind -T prefix "\\" split-window -fh -c "#{pane_current_path}"
bind -r -T root "C-\\" split-window -fh -c "#{pane_current_path}"
bind -r -T root "C-|" split-window -fh -c "#{pane_current_path}"
# Panes: split vertical
bind -T prefix "-" split-window -v -c "#{pane_current_path}"
bind -T prefix "_" split-window -fv -c "#{pane_current_path}"
# Panes: split - enhance defaults to keep current path
bind -T prefix "%" split-window -h -c "#{pane_current_path}"
bind -T prefix '"' split-window -v -c "#{pane_current_path}"

# Panes: rename pane
bind -T prefix r command-prompt -I "#{pane_title}" { select-pane -T "%%" }

# Panes: resize
bind -r -T prefix H resize-pane -L 5
bind -r -T prefix J resize-pane -D 5
bind -r -T prefix K resize-pane -U 5
bind -r -T prefix L resize-pane -R 5
# Panes: resize (no prefix)
bind -r -T prefix C-H resize-pane -L 5
bind -r -T prefix C-J resize-pane -D 5
bind -r -T prefix C-K resize-pane -U 5
bind -r -T prefix C-L resize-pane -R 5

# Panes: swap
bind -T prefix Left  swap-pane -t '{left-of}'
bind -T prefix Right swap-pane -t '{right-of}'
bind -T prefix Up    swap-pane -t '{up-of}'
bind -T prefix Down  swap-pane -t '{down-of}'
# Panes: swap (no prefix)
bind -T root C-Left  swap-pane -t '{left-of}'
bind -T root C-Right swap-pane -t '{right-of}'
bind -T root C-Up    swap-pane -t '{up-of}'
bind -T root C-Down  swap-pane -t '{down-of}'

# ==============================================================================

# Tabs (Window): prefix key chord
bind -T prefix t switch-client -T chord_tab

# Tabs (Windows): close
bind -T chord_tab x kill-window

# Tabs (Windows): navigation
bind -r -T prefix "," previous-window
bind -r -T prefix "." next-window
#Tabs (Windows): Move
bind -T prefix "<" swap-window -d -t -1
bind -T prefix ">" swap-window -d -t +1

# Tabs (Windows): jump to window by number (no prefix)
# Alacritty emits CSI u sequences for these keys; extended-keys on lets tmux
# recognize them by their friendly names. See WKMZTAFD6544 alacritty.toml.
bind -T root C-1 select-window -t 1
bind -T root C-2 select-window -t 2
bind -T root C-3 select-window -t 3
bind -T root C-4 select-window -t 4
bind -T root C-5 select-window -t 5
bind -T root C-6 select-window -t 6
bind -T root C-7 select-window -t 7
bind -T root C-8 select-window -t 8
bind -T root C-9 select-window -t 9
# C-[ / C-] — prev/next window (no prefix)
# Same CSI u setup. Note: C-[ no longer sends ESC — use Escape key directly.
bind -T root C-[ previous-window
bind -T root C-] next-window

# Tabs (Windows): new
bind -T chord_tab n command-prompt -p "New window:" "new-window -n '%%'"
bind -r -T root "C-n" command-prompt -p "New window:" "new-window -n '%%'"

# Tabs (Windows): rename
bind -T chord_tab r command-prompt -p "Rename window:" -I '#W' 'rename-window "%%"'

# ==============================================================================
# STATUS BAR
# ==============================================================================
# Pallettes     Nord      Tokyo
# background    #2e3440   #1A1B26
# background2   #3b4252   #2a2f41
# background3   #434c5e   #414868
# foreground    #d8dee9   #a9b1d6
# powerline1    #5e81ac   #7aa2f7
# powerline2    #81a1c1   #7dcfff
# powerline3    #88c0d0   #73daca
# powerline4    #8fbcbb   #41a6b5
# ok            #a3be8c   #
# error         #bf616a   #f7768e
# warning       #ebcb8b   #e0af68
# info          #b48ead   #bb9af7


set -g status on
set -g status-position top
set -g status-interval 5

# Status bar
set -g status-style "bg=#2e3440,fg=#D8DEE9"
set -g status-format[0] "#[align=left,bg=#2e3440]#{W:#[fg=#5e81ac] #I:#W , #[bg=#2e3440 fg=#ebcb8b bold] #I:#W }#[align=right,bg=#2e3440]#{?client_prefix,#[bg=#a3be8c fg=#2e3440] PREFIX ,#[fg=#a3be8c] #S }#[bg=#2e3440 fg=#5e81ac] #h "

# Tabs/Windows
set -g window-status-activity-style "bg=#8fbcbb,fg=#2e3440"
set -g window-status-bell-style     "bg=#8fbcbb,fg=#2e3440"
set -g window-status-last-style     "bg=#3b4252,fg=#D8DEE9"
set -g window-status-format         "#[fg=#5e81ac] #I:#W "
set -g window-status-current-format " #[bg=#2E3440,fg=#ebcb8b, bold] #I:#W "
set -g window-status-separator      ""

# Command prompt
set -g message-style         "bg=#b48ead,fg=#2e3440"
set -g message-command-style "bg=#3b4252,fg=#b48ead"

# Pane borders
set -g pane-border-style        "fg=#434c5e"
set -g pane-active-border-style "fg=#434c5e"

# Menus
set -g menu-style          "bg=#2e3440,fg=#D8DEE9"
set -g menu-selected-style "bg=#81a1c1,fg=#2e3440"
set -g menu-border-style   "fg=#434c5e"

# Popups
set -g popup-style        "bg=#2e3440,fg=#D8DEE9"
set -g popup-border-style "fg=#434c5e"




# ==============================================================================
# SETTINGS
# ==============================================================================
# indexes starts with 1
set -g base-index 1
setw -g pane-base-index 1

# faster key repetition
set -s escape-time 0

# mouse clicks allowed
set -g mouse on

# advertise 256-color support to applications inside the session
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# scrollback buffer size
set -g history-limit 10000

# automatically renumbers windows sequentially whenever a window is closed
set -g renumber-windows on

# prevent tmux from automatically renaming windows
set -g allow-rename off
set -g automatic-rename off
set -g allow-rename off
# new windows have name of "."
set -g window-status-format "."
set -g window-status-current-format "."

# vi mode for copy/scroll
setw -g mode-keys vi

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ==============================================================================
# KEYBINDS
# ==============================================================================

# Prefix: [control]+[space]
set -g prefix C-Space
bind C-Space send-prefix

# emulate 'C-a' prefix (for pair partners)
bind C-a send-prefix
bind a last-window

# emulate 'C-b' prefix (for pair partners)
bind C-b send-prefix
bind b last-window


# Menu: Quick Actions
bind Space display-menu -T "Quick Actions" \
  "Reload Config"  r "source-file ~/.config/tmux/tmux.conf" \
  "" \
  "Horizontal Split"  h "split-window -v -c '#{pane_current_path}'" \
  "Vertical Split"    v "split-window -h -c '#{pane_current_path}'" \


# Panes: close
bind -T prefix x kill-pane

# Panes: fullscreen toggle
bind -T prefix f resize-pane -Z

# Panes: navigation
bind -T prefix h select-pane -L
bind -T prefix j select-pane -D
bind -T prefix k select-pane -U
bind -T prefix l select-pane -R
# Panes: navigation (no prefix)
bind -T root C-h select-pane -L
bind -T root C-j select-pane -D
bind -T root C-k select-pane -U
bind -T root C-l select-pane -R

# Panes: split horizontal
bind -T prefix "|" split-window -h -c "#{pane_current_path}"
bind -T prefix "\\" split-window -fh -c "#{pane_current_path}"
# Panes: split vertical
bind -T prefix "-" split-window -v -c "#{pane_current_path}"
bind -T prefix "_" split-window -fv -c "#{pane_current_path}"
# Panes: split - enhance defaults to keep current path
bind -T prefix "%" split-window -h -c "#{pane_current_path}"
bind -T prefix '"' split-window -v -c "#{pane_current_path}"

# Panes: rename pane
bind -T prefix r command-prompt -I "#{pane_title}" { select-pane -T "%%" }

# Panes: resize
bind -r -T prefix H resize-pane -L 5
bind -r -T prefix J resize-pane -D 5
bind -r -T prefix K resize-pane -U 5
bind -r -T prefix L resize-pane -R 5
# Panes: resize (no prefix)
bind -r -T prefix C-H resize-pane -L 5
bind -r -T prefix C-J resize-pane -D 5
bind -r -T prefix C-K resize-pane -U 5
bind -r -T prefix C-L resize-pane -R 5

# Panes: swap
bind -T prefix Left  swap-pane -t '{left-of}'
bind -T prefix Right swap-pane -t '{right-of}'
bind -T prefix Up    swap-pane -t '{up-of}'
bind -T prefix Down  swap-pane -t '{down-of}'
# Panes: swap (no prefix)
bind -T root C-Left  swap-pane -t '{left-of}'
bind -T root C-Right swap-pane -t '{right-of}'
bind -T root C-Up    swap-pane -t '{up-of}'
bind -T root C-Down  swap-pane -t '{down-of}'

# Tabs (Window): key chord
bind -T prefix t switch-client -T chord_tab

# Tabs (Windows): close
bind -T chord_tab x kill-window

# Tabs (Windows): navigation
bind -r -T prefix "," previous-window
bind -r -T prefix "." next-window
# Tabs (Windows): navigation (no prefix)
bind -r -T root C-, previous-window
bind -r -T root C-. next-window

#Tabs (Windows): Move
bind -T prefix "<" swap-window -d -t -1
bind -T prefix ">" swap-window -d -t +1
#Tabs (Windows): Move (no prefix)
bind -T root C-< swap-window -d -t -1
bind -T root C-> swap-window -d -t +1

# Tabs (Windows): new
bind -T chord_tab n command-prompt -p "New window:" "new-window -n '%%'"

# Tabs (Windows): rename
bind -T chord_tab r command-prompt -p "Rename window:" -I '#W' 'rename-window "%%"'



# ==============================================================================
# COLORSCHEME
# ==============================================================================

# [everforest dark medium](https://github.com/TanglingTreats/tmux-everforest/blob/main/tmux-everforest-dark-hard.conf)
set -g @everforest_bg_dim '#1e2326'
set -g @everforest_bg0 '#272e33'
set -g @everforest_bg1 '#2e383c'
set -g @everforest_bg2 '#374145'
set -g @everforest_bg3 '#414b50'
set -g @everforest_bg4 '#495156'
set -g @everforest_bg5 '#4f5b58'
set -g @everforest_bg_visual '#4c3743'
set -g @everforest_bg_red '#493b40'
set -g @everforest_bg_green '#3c4841'
set -g @everforest_bg_blue '#384b55'
set -g @everforest_bg_yellow '#45443c'

set -g @everforest_fg '#d3c6aa'
set -g @everforest_red '#e67e80'
set -g @everforest_orange '#e69875'
set -g @everforest_yellow '#dbbc7f'
set -g @everforest_green '#a7c080'
set -g @everforest_aqua '#83c092'
set -g @everforest_blue '#7fbbb3'
set -g @everforest_purple '#d699b6'
set -g @everforest_grey0 '#7a8478'
set -g @everforest_grey1 '#859289'
set -g @everforest_grey2 '#9da9a0'
set -g @everforest_statusline1 '#a7c080'
set -g @everforest_statusline2 '#d3c6aa'
set -g @everforest_statusline3 '#e67e80'


# ==============================================================================
# STATUS BAR
# ==============================================================================
set -g status "on"
set -g status-position top
# Refresh status components faster
set -g status-interval 2


set -g status-fg '#d3c6aa' # fg (No idea why I can't use variables here)
set -g status-bg '#2d353b' # bg0

set -g mode-style fg='#{@everforest_purple}',bg='#{@everforest_bg_red}' # fg=purple, bg=bg_visual

# default statusbar colors
set -g status-style fg='#{@everforest_fg}',bg='#{@everforest_bg_dim}',default # fg=fg bg=bg_dim

# ---- Windows ----
# default window title colors
setw -g window-status-style fg='#{@everforest_bg5}',bg='#{@everforest_bg0}' # fg=yellow bg=bg0

# default window with an activity alert
setw -g window-status-activity-style 'bg=#{@everforest_bg1},fg=#{@everforest_bg3}' # bg=bg1, fg=fg3

# active window title colors
setw -g window-status-current-style fg='#{@everforest_fg}',bg='#{@everforest_bg_green}' # fg=fg bg=bg_green

# ---- Pane ----
# pane borders
set -g pane-border-style fg='#{@everforest_bg1}' # fg=bg1
set -g pane-active-border-style 'fg=#{@everforest_blue}' # fg=blue

# pane number display
set -g display-panes-active-colour '#7fbbb3' # blue
set -g display-panes-colour '#e69875' # orange

# ---- Command ----
# message info
set -g message-style fg='#{@everforest_statusline3}',bg='#{@everforest_bg_dim}' # fg=statusline3 bg=bg_dim

# writing commands inactive
set -g message-command-style 'fg=#{@everforest_bg3},bg=#{@everforest_bg1}' # bg=fg3, fg=bg1

# ---- Miscellaneous ----
# clock
setw -g clock-mode-colour '#7fbbb3' #blue

# bell
setw -g window-status-bell-style fg='#{@everforest_bg0}',bg='#{@everforest_statusline3}' # fg=bg, bg=statusline3

# ---- Formatting ----
set -g status-left-style none
set -g status-left-length 60
set -g status-left '#[fg=#{@everforest_bg_dim},bg=#{@everforest_green},bold] #S #[fg=#{@everforest_green},bg=#{@everforest_bg2},nobold]#[fg=#{@everforest_green},bg=#{@everforest_bg2},bold] #(whoami) #[fg=#{@everforest_bg2},bg=#{@everforest_bg0},nobold]'

set -g status-right-style none
set -g status-right-length 150
set -g status-right '#[fg=#{@everforest_bg2}]#[fg=#{@everforest_fg},bg=#{@everforest_bg2}] #[fg=#{@everforest_fg},bg=#{@everforest_bg2}]%Y-%m-%d  %H:%M #[fg=#{@everforest_aqua},bg=#{@everforest_bg2},bold]#[fg=#{@everforest_bg_dim},bg=#{@everforest_aqua},bold] #h '

set -g window-status-separator '#[fg=#{@everforest_grey2},bg=#{@everforest_bg0}] '
set -g window-status-format "#[fg=#{@everforest_grey0},bg=#{@everforest_bg0}] #I  #[fg=#{@everforest_grey0},bg=#{@everforest_bg0}]#W "
set -g window-status-current-format "#[fg=#{@everforest_bg0},bg=#{@everforest_bg_green}]#[fg=#{@everforest_fg},bg=#{@everforest_bg_green}] #I  #[fg=#{@everforest_fg},bg=#{@everforest_bg_green},bold]#W #[fg=#{@everforest_bg_green},bg=#{@everforest_bg0},nobold]"

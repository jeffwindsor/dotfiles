[env]
TERM = "alacritty"

[font]
size = 16
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }

[window]
padding.x = 4
padding.y = 4
decorations = "None"
option_as_alt = "Both"
# opacity = 0.94

# Terminals don't send distinct escape codes for C-1..9, C-[, C-] by default —
# they arrive as plain 1-9, ESC, and GS. To make tmux root bindings work, we
# configure Alacritty to emit kitty-protocol CSI u sequences instead:
#   format: ESC [ <unicode-codepoint> ; <modifier> u
#   modifier 5 = Ctrl
# tmux then binds those sequences in its root key table.
# Side effect: C-[ no longer sends ESC — use the Escape key directly.
[keyboard]
bindings = [
  { key = "Return",   mods = "Shift",   chars = "\n" },
  { key = "Enter",    mods = "Shift",   chars = "\n" },
  { key = "Key1",     mods = "Control", chars = "\u001b[49;5u" },
  { key = "Key2",     mods = "Control", chars = "\u001b[50;5u" },
  { key = "Key3",     mods = "Control", chars = "\u001b[51;5u" },
  { key = "Key4",     mods = "Control", chars = "\u001b[52;5u" },
  { key = "Key5",     mods = "Control", chars = "\u001b[53;5u" },
  { key = "Key6",     mods = "Control", chars = "\u001b[54;5u" },
  { key = "Key7",     mods = "Control", chars = "\u001b[55;5u" },
  { key = "Key8",     mods = "Control", chars = "\u001b[56;5u" },
  { key = "Key9",     mods = "Control", chars = "\u001b[57;5u" },
  { key = "LBracket", mods = "Control", chars = "\u001b[91;5u" },
  { key = "RBracket", mods = "Control", chars = "\u001b[93;5u" },
]

[general]
import = ["~/.config/alacritty/themes/0x96f.toml"]

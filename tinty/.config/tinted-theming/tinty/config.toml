# ── Tinty-managed items ───────────────────────────────────────────────────────

# -- Terminals
[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "alacritty"
themes-dir = "themes/alacritty"
hook = "cp -f %f ~/.config/alacritty/colors.toml && touch ~/.config/alacritty/alacritty.toml"
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "kitty"
themes-dir = "themes/kitty"
hook = "cp -f %f ~/.config/kitty/tinted-theming.conf && [ -n \"$KITTY_PID\" ] && kill -USR1 \"$KITTY_PID\""
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "ghostty"
themes-dir = "themes/ghostty"
hook = "mkdir -p ~/.config/ghostty/themes && cp -f %f ~/.config/ghostty/themes/tinted-theming && killall -SIGUSR2 ghostty 2>/dev/null || true"
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "wezterm"
themes-dir = "themes/wezterm"
hook = "mkdir -p ~/.config/wezterm/colors && cp -f %f ~/.config/wezterm/colors/tinted-theming.toml"
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "zellij"
themes-dir = "scripts"
hook = ". %f && bash ~/.config/tinted-theming/tinty/hooks/zellij-theme.sh"

# -- Shell commands
[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "lsd"
themes-dir = "scripts"
hook = ". %f && bash ~/.config/tinted-theming/tinty/hooks/lsd-colors.sh"

[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "yazi"
themes-dir = "scripts"
hook = ". %f && bash ~/.config/tinted-theming/tinty/hooks/yazi-flavor.sh"


[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "cosmic"
themes-dir = "scripts"
hook = ". %f && bash ~/.config/tinted-theming/tinty/hooks/cosmic-color.sh"


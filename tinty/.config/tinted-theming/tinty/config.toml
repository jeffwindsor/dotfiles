# ── Tinty-managed items ───────────────────────────────────────────────────────

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "tinted-terminal-alacritty"
themes-dir = "themes/alacritty"
hook = "cp -f %f ~/.config/alacritty/colors.toml && touch ~/.config/alacritty/alacritty.toml"
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "tinted-terminal-ghostty"
themes-dir = "themes/ghostty"
hook = "mkdir -p ~/.config/ghostty/themes && cp -f $TINTY_THEME_FILE_PATH ~/.config/ghostty/themes/tinted-theming && killall -SIGUSR2 ghostty 2>/dev/null || true"
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "tinted-terminal-kitty"
themes-dir = "themes/kitty"
hook = "cp -f %f ~/.config/kitty/tinted-theming.conf && [ -n \"$KITTY_PID\" ] && kill -USR1 \"$KITTY_PID\""
supported-systems = ["base16", "base24"]

[[items]]
path = "https://github.com/tinted-theming/tinted-tmux"
name = "tinted-tmux"
themes-dir = "colors"
hook = "tmux run 2>/dev/null && tmux source-file %f"

[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "tinted-shell"
themes-dir = "scripts"
hook = ". %f && env > /tmp/tinty-env-dump.txt && bash ~/.config/tinted-theming/tinty/hooks/zellij-theme.sh && bash ~/.config/tinted-theming/tinty/hooks/lsd-colors.sh && bash ~/.config/tinted-theming/tinty/hooks/yazi-flavor.sh"

